<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOA</title>
  <style>
    @font-face {
      font-family: 'ABCDiatype';
      src: url('2. Font/ABCDiatype-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'ABCDiatype';
      src: url('2. Font/ABCDiatype-Medium.ttf') format('truetype');
      font-weight: 500;
    }
    @font-face {
      font-family: 'ABCDiatype';
      src: url('2. Font/ABCDiatype-Bold.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'HoboNo2';
      src: url('2. Font/Hobo No2 Bold.otf') format('opentype');
      font-weight: 700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #FF6600;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'ABCDiatype', sans-serif;
    }

    #logo {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      object-fit: fill;
      mix-blend-mode: multiply;
      user-select: none;
      pointer-events: none;
    }

    #convoy {
      position: absolute;
      display: flex;
      gap: 30px;
      align-items: flex-end;
    }

    #convoy img {
      width: 220px;
      mix-blend-mode: multiply;
      user-select: none;
      cursor: pointer;
      display: block;
    }

    /* INFO */
    #info-btn {
      position: fixed;
      top: 20px;
      right: 24px;
      font-family: 'ABCDiatype', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #000;
      cursor: pointer;
      z-index: 50;
      letter-spacing: 0.05em;
    }

    /* MODALS */
    .modal {
      position: fixed;
      top: 20px;
      background: #fff;
      width: 340px;
      max-height: 78vh;
      border-radius: 10px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 100;
    }
    .modal.visible { display: flex; }

    .modal-header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'ABCDiatype', sans-serif;
      font-size: 22px;
      font-weight: 500;
      padding: 8px 10px 8px;
    }

    .modal-close {
      cursor: pointer;
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
      background: none;
      border: none;
      font-family: 'ABCDiatype', sans-serif;
      color: #000;
      padding: 0;
    }

    .modal-scroll {
      overflow-y: auto;
      flex: 1;
    }

    .modal-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #d4d4d4;
    }

    .modal-route {
      font-family: 'ABCDiatype', sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      padding: 12px 10px 4px;
    }

    .modal-km {
      font-family: 'HoboNo2', sans-serif;
      font-size: 80px;
      line-height: 0.85;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 10px 6px;
    }

    .modal-price {
      font-family: 'ABCDiatype', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      padding: 2px 10px 10px;
    }

    .modal-desc {
      font-family: 'ABCDiatype', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      line-height: 1.1;
      color: #000;
      padding: 0 10px 16px;
    }

    .modal-btn {
      display: block;
      margin: 0 10px 16px;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 12px 10px;
      font-family: 'ABCDiatype', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 6px;
      letter-spacing: 0.01em;
    }
    .modal-btn:hover { background: #222; }

    #modal1 { left: 20px; }
    #modal2 { left: 376px; }
  </style>
</head>
<body>

  <img id="logo" src="1. Immagini/Senza titolo-3 [Recuperato]-03.png" alt="Logo">

  <div id="convoy">
    <img id="truck1" src="1. Immagini/Senza titolo-3 [Recuperato]-01.png" alt="Furgone 1">
    <img id="truck2" src="1. Immagini/Senza titolo-3 [Recuperato]-02.png" alt="Furgone 2">
  </div>

  <div id="info-btn">INFO</div>

  <!-- Modal tratta 1 -->
  <div class="modal" id="modal1">
    <div class="modal-header">
      <span>FOA</span>
      <button class="modal-close" onclick="document.getElementById('modal1').classList.remove('visible')">&times;</button>
    </div>
    <div class="modal-scroll">
      <div class="modal-image"></div>
      <div class="modal-route">Aosta → Torino</div>
      <div class="modal-km"><span>120</span><span>KM</span></div>
      <div class="modal-price">20€</div>
      <div class="modal-desc">Sponsorizzi la prima tratta del Giro d'Italia FOA. Il tuo nome entra nel libro.</div>
      <a class="modal-btn" href="https://foa.bigcartel.com/product/aosta-torino" target="_blank">Sponsorizza questa tratta →</a>
    </div>
  </div>

  <!-- Modal tratta 2 -->
  <div class="modal" id="modal2">
    <div class="modal-header">
      <span>FOA</span>
      <button class="modal-close" onclick="document.getElementById('modal2').classList.remove('visible')">&times;</button>
    </div>
    <div class="modal-scroll">
      <div class="modal-image"></div>
      <div class="modal-route">Torino → Milano</div>
      <div class="modal-km"><span>140</span><span>KM</span></div>
      <div class="modal-price">25€</div>
      <div class="modal-desc">Sponsorizzi la seconda tratta del Giro d'Italia FOA. Il tuo nome entra nel libro.</div>
      <a class="modal-btn" href="https://foa.bigcartel.com/product/torino-milano" target="_blank">Sponsorizza questa tratta →</a>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const logo = document.getElementById('logo');
      const convoy = document.getElementById('convoy');

      const bottomMargin = 20;
      const logoGap = 20;

      const truckHeight = convoy.offsetHeight;
      const convoyWidth = convoy.offsetWidth;
      const groundY = window.innerHeight - truckHeight - bottomMargin;

      logo.style.height = (groundY - logoGap) + 'px';

      let x = (window.innerWidth - convoyWidth) / 2;
      let y = groundY;
      let vy = 0;
      const gravity = 0.6;
      const jumpForce = -28;
      let onGround = true;
      const speed = 18;
      let scaleX = 1;
      let facingRight = false;

      const keys = {};

      document.addEventListener('keydown', e => {
        if (!keys[e.key]) {
          keys[e.key] = true;
          if (e.key === ' ' && onGround) {
            vy = jumpForce;
            onGround = false;
            e.preventDefault();
          }
        }
      });
      document.addEventListener('keyup', e => { keys[e.key] = false; });

      document.getElementById('truck1').addEventListener('click', () => {
        document.getElementById('modal1').classList.toggle('visible');
      });
      document.getElementById('truck2').addEventListener('click', () => {
        document.getElementById('modal2').classList.toggle('visible');
      });

      function update() {
        if (keys['ArrowRight']) {
          if (!facingRight) { scaleX = -1; facingRight = true; }
          x += speed;
        }
        if (keys['ArrowLeft']) {
          if (facingRight) { scaleX = 1; facingRight = false; }
          x -= speed;
        }

        if (x > window.innerWidth) x = -convoyWidth;
        else if (x < -convoyWidth) x = window.innerWidth;

        vy += gravity;
        y += vy;
        if (y >= groundY) {
          y = groundY;
          vy = 0;
          onGround = true;
        }

        convoy.style.left = x + 'px';
        convoy.style.top = y + 'px';
        convoy.style.transform = `scaleX(${scaleX})`;

        requestAnimationFrame(update);
      }

      update();
    });
  </script>
</body>
</html>
