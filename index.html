<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOA</title>
  <style>
    @font-face {
      font-family: 'ABCDiatype';
      src: url('2. Font/ABCDiatype-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'ABCDiatype';
      src: url('2. Font/ABCDiatype-Medium.ttf') format('truetype');
      font-weight: 500;
    }
    @font-face {
      font-family: 'ABCDiatype';
      src: url('2. Font/ABCDiatype-Bold.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'HoboNo2';
      src: url('2. Font/Hobo No2 Bold.otf') format('opentype');
      font-weight: 700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #FF6600;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'ABCDiatype', sans-serif;
    }

    #logo {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      object-fit: fill;
      mix-blend-mode: multiply;
      user-select: none;
      pointer-events: none;
    }

    #convoy {
      position: absolute;
      display: flex;
      gap: 30px;
      align-items: flex-end;
    }

    #convoy img {
      width: 220px;
      mix-blend-mode: multiply;
      user-select: none;
      cursor: pointer;
      display: block;
      -webkit-tap-highlight-color: transparent;
    }

    #foa-text {
      cursor: default;
      align-self: flex-start;
      width: auto !important;
    }

    #info-btn {
      position: fixed;
      top: 20px;
      right: 24px;
      font-family: 'ABCDiatype', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #000;
      cursor: pointer;
      z-index: 50;
      letter-spacing: 0.05em;
    }

    /* PANEL */
    #panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 340px;
      max-height: 78vh;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 100;
    }
    #panel.visible { display: flex; }

    @media (max-width: 600px) {
      #panel {
        top: auto;
        bottom: 20px;
        left: 16px;
        right: 16px;
        width: auto;
        max-height: 72vh;
      }
    }

    #panel-header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'ABCDiatype', sans-serif;
      font-size: 22px;
      font-weight: 500;
      padding: 8px 10px;
    }

    #panel-close {
      cursor: pointer;
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
      background: none;
      border: none;
      font-family: 'ABCDiatype', sans-serif;
      color: #000;
      padding: 0;
    }

    /* INFINITE TRACK */
    #panel-track {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex: 1;
    }
    #panel-track::-webkit-scrollbar { display: none; }

    /* CARD */
    .card {
      flex-shrink: 0;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-align: start;
      overscroll-behavior-y: contain;
    }
    .card::-webkit-scrollbar { display: none; }
    .card { scrollbar-width: none; }

    .card-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #d4d4d4;
    }

    .card-route {
      font-family: 'ABCDiatype', sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      padding: 12px 10px 4px;
    }

    .card-km {
      font-family: 'HoboNo2', sans-serif;
      font-size: 80px;
      line-height: 0.85;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 10px 6px;
    }

    .card-price {
      font-family: 'ABCDiatype', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      padding: 2px 10px 10px;
    }

    .card-desc {
      font-family: 'ABCDiatype', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      line-height: 1.1;
      padding: 0 10px 14px;
    }

    .card-btn {
      display: block;
      margin: 0 10px 16px;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 12px 10px;
      font-family: 'ABCDiatype', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 6px;
    }
    .card-btn:hover { background: #222; }
  </style>
</head>
<body>

  <img id="logo" src="1. Immagini/Senza titolo-3 [Recuperato]-03.png" alt="Logo">

  <div id="convoy">
    <img id="truck1" src="1. Immagini/Senza titolo-3 [Recuperato]-01.png" alt="Furgone 1">
    <img id="truck2" src="1. Immagini/Senza titolo-3 [Recuperato]-02.png" alt="Furgone 2">
    <img id="foa-text" src="1. Immagini/4-04.png" alt="FOA">
  </div>

  <div id="info-btn">INFO</div>

  <div id="panel">
    <div id="panel-header">
      <span>FOA</span>
      <button id="panel-close">&times;</button>
    </div>
    <div id="panel-track"></div>
  </div>

  <script>
    const products = [
      {
        route: 'Aosta → Torino',
        km: '120',
        price: '20€',
        permalink: 'aosta-torino',
        desc: 'Sponsorizzi la prima tratta del Giro d\'Italia FOA. Il tuo nome entra nel libro.'
      },
      {
        route: 'Torino → Milano',
        km: '140',
        price: '25€',
        permalink: 'torino-milano',
        desc: 'Sponsorizzi la seconda tratta del Giro d\'Italia FOA. Il tuo nome entra nel libro.'
      }
    ];

    // ── INFINITE CAROUSEL ───────────────────────────────────────────
    const COPIES = 5;
    const track = document.getElementById('panel-track');
    const panel = document.getElementById('panel');
    let cardWidth = 0;
    let carouselReady = false;

    function makeCard(p) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-image"></div>
        <div class="card-route">${p.route}</div>
        <div class="card-km"><span>${p.km}</span><span>KM</span></div>
        <div class="card-price">${p.price}</div>
        <div class="card-desc">${p.desc}</div>
        <a class="card-btn" href="https://foa.bigcartel.com/product/${p.permalink}" target="_blank">Sponsorizza questa tratta →</a>
      `;
      return card;
    }

    function initCarousel() {
      track.innerHTML = '';
      for (let c = 0; c < COPIES; c++) {
        products.forEach(p => track.appendChild(makeCard(p)));
      }
      carouselReady = true;
    }

    function scrollToIndex(index) {
      cardWidth = track.clientWidth;
      const n = products.length;
      const mid = Math.floor(COPIES / 2);
      track.scrollLeft = (mid * n + index) * cardWidth;
    }

    // infinite loop reset (fires after scroll settles)
    let scrollTimer = null;
    track.addEventListener('scroll', () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        cardWidth = track.clientWidth;
        const n = products.length;
        const setW = n * cardWidth;
        const lo = setW;
        const hi = setW * (COPIES - 2);
        if (track.scrollLeft < lo) {
          track.scrollLeft += setW * Math.floor(COPIES / 2);
        } else if (track.scrollLeft > hi) {
          track.scrollLeft -= setW * Math.floor(COPIES / 2);
        }
      }, 120);
    }, { passive: true });

    function openPanel(index) {
      if (!carouselReady) initCarousel();
      panel.classList.add('visible');
      requestAnimationFrame(() => scrollToIndex(index));
    }

    document.getElementById('panel-close').addEventListener('click', () => {
      panel.classList.remove('visible');
    });

    // ── GAME ────────────────────────────────────────────────────────
    window.addEventListener('load', () => {
      const logo    = document.getElementById('logo');
      const convoy  = document.getElementById('convoy');
      const foaEl   = document.getElementById('foa-text');

      // match FOA height to truck height, width scales proportionally
      const truck1El = document.getElementById('truck1');
      function matchFoaHeight() {
        foaEl.style.height = truck1El.offsetHeight + 'px';
      }
      if (truck1El.complete) matchFoaHeight();
      else truck1El.addEventListener('load', matchFoaHeight);
      const isMobile = ('ontouchstart' in window) || window.innerWidth < 768;

      const bottomMargin = 20;
      const logoGap = 20;
      const truckHeight = convoy.offsetHeight;
      const convoyWidth = convoy.offsetWidth;
      const groundY = window.innerHeight - truckHeight - bottomMargin;

      logo.style.height = (groundY - logoGap) + 'px';

      let x = (window.innerWidth - convoyWidth) / 2;
      let y = groundY;
      let vy = 0;
      const gravity = 0.6;
      const jumpForce = -28;
      let onGround = true;
      const speed = 18;
      const autoSpeed = 1.5;
      let scaleX = 1;
      let facingRight = false;

      const keys = {};

      if (!isMobile) {
        document.addEventListener('keydown', e => {
          if (!keys[e.key]) {
            keys[e.key] = true;
            if (e.key === ' ' && onGround) {
              vy = jumpForce;
              onGround = false;
              e.preventDefault();
            }
          }
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });
      }

      document.getElementById('truck1').addEventListener('click', () => openPanel(0));
      document.getElementById('truck2').addEventListener('click', () => openPanel(1));

      function update() {
        if (isMobile) {
          // autonomous slow rightward drift
          if (!facingRight) { scaleX = -1; facingRight = true; }
          x += autoSpeed;
          if (x > window.innerWidth) x = -convoyWidth;
        } else {
          if (keys['ArrowRight']) {
            if (!facingRight) { scaleX = -1; facingRight = true; }
            x += speed;
          }
          if (keys['ArrowLeft']) {
            if (facingRight) { scaleX = 1; facingRight = false; }
            x -= speed;
          }
          if (x > window.innerWidth) x = -convoyWidth;
          else if (x < -convoyWidth) x = window.innerWidth;

          vy += gravity;
          y += vy;
          if (y >= groundY) { y = groundY; vy = 0; onGround = true; }
        }

        convoy.style.left = x + 'px';
        convoy.style.top  = y + 'px';
        convoy.style.transform = `scaleX(${scaleX})`;
        requestAnimationFrame(update);
      }

      update();
    });
  </script>
</body>
</html>
